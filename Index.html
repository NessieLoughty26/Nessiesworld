<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Nessie's World</title>
<link rel="apple-touch-icon" id="apple-touch-icon" sizes="180x180"/>
<script>
(function(){
  var c=document.createElement('canvas');
  c.width=c.height=180;
  var ctx=c.getContext('2d');
  ctx.fillStyle='#fdf6f0';
  ctx.beginPath();
  var r=36,w=180,h=180;
  ctx.moveTo(r,0);ctx.lineTo(w-r,0);ctx.quadraticCurveTo(w,0,w,r);
  ctx.lineTo(w,h-r);ctx.quadraticCurveTo(w,h,w-r,h);
  ctx.lineTo(r,h);ctx.quadraticCurveTo(0,h,0,h-r);
  ctx.lineTo(0,r);ctx.quadraticCurveTo(0,0,r,0);
  ctx.closePath();ctx.fill();
  ctx.font='120px serif';
  ctx.textAlign='center';
  ctx.textBaseline='middle';
  ctx.fillText('🍓',90,95);
  var link=document.getElementById('apple-touch-icon');
  link.href=c.toDataURL('image/png');
})();
</script>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Nunito:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #fdf6f0; --bg2: #f7ede4; --bg3: #efe0d4;
    --card: #ffffff; --card2: #fdf0e8;
    --border: rgba(180,100,80,0.15); --border2: rgba(180,100,80,0.08);
    --rose: #c75c72; --rose2: #e07d8f; --rose-dim: rgba(199,92,114,0.25);
    --blush: #8b2a42; --dusty: #b06070; --cream: #fce8e8;
    --text: #2d1a1f; --text2: #7a4a55; --text3: #b08090;
    --red: #c03040; --berry: #8b1a42;
    --font-d: 'Libre Baskerville', Georgia, serif;
    --font-b: 'Nunito', system-ui, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font-b); font-size: 15px; }
  body::before { content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background-image: radial-gradient(circle, rgba(199,92,114,0.05) 1px, transparent 1px);
    background-size: 22px 22px; }
  ::-webkit-scrollbar { width: 3px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--rose-dim); border-radius: 2px; }
  #app { max-width: 480px; margin: 0 auto; min-height: 100vh; position: relative; padding-bottom: 72px; z-index: 1; }
  header { background: linear-gradient(180deg, #f9e8e0 0%, var(--bg2) 100%); border-bottom: 1px solid var(--border); padding: 14px 16px 10px; text-align: center; position: sticky; top: 0; z-index: 100; }
  header h1 { font-family: var(--font-d); font-size: 24px; font-style: italic; font-weight: 400; color: var(--blush); letter-spacing: 0.02em; }
  header h1::before { content: '\1F353 '; font-size: 14px; font-style: normal; }
  header p { font-size: 9px; color: var(--text3); letter-spacing: 0.18em; text-transform: uppercase; margin-top: 3px; }
  nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px; background: var(--card); border-top: 1px solid var(--border); display: flex; z-index: 200; }
  nav button { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 8px 2px 6px; background: none; border: none; cursor: pointer; color: var(--text3); font-family: var(--font-b); transition: color 0.2s; }
  nav button .icon { font-size: 16px; }
  nav button .lbl { font-size: 9px; margin-top: 2px; letter-spacing: 0.03em; font-weight: 400; }
  nav button.active { color: var(--rose); border-top: 1.5px solid var(--rose); }
  main { padding: 12px 12px 16px; }
  .col { display: flex; flex-direction: column; gap: 10px; }
  .card { background: var(--card); border-radius: 16px; padding: 13px 14px; border: 1px solid var(--border2); box-shadow: 0 2px 12px rgba(180,100,80,0.07); }
  input, textarea, select { background: var(--bg3); border: 1px solid var(--border); border-radius: 10px; padding: 9px 12px; font-family: var(--font-b); font-size: 14px; color: var(--text); outline: none; width: 100%; transition: border-color 0.2s; font-weight: 300; }
  input:focus, textarea:focus, select:focus { border-color: var(--rose-dim); }
  input::placeholder, textarea::placeholder { color: var(--text3); }
  textarea { resize: vertical; }
  select option { background: var(--bg3); }
  .btn { background: var(--rose); color: #fff; border: none; border-radius: 10px; padding: 9px 17px; font-family: var(--font-b); font-size: 13px; font-weight: 500; cursor: pointer; white-space: nowrap; transition: background 0.2s; }
  .btn:hover { background: var(--rose2); }
  .btn-outline { background: none; color: var(--rose); border: 1.5px solid var(--rose-dim); border-radius: 10px; padding: 8px 15px; font-family: var(--font-b); font-size: 13px; cursor: pointer; }
  .btn-ghost { background: none; border: none; cursor: pointer; color: var(--text2); font-family: var(--font-b); font-size: 13px; padding: 4px 6px; }
  .btn-sm { padding: 6px 13px; font-size: 12px; border-radius: 9px; }
  .btn-full { width: 100%; }
  .icon-btn { background: none; border: none; cursor: pointer; color: var(--text3); font-size: 14px; padding: 3px 4px; transition: color 0.15s; }
  .icon-btn:hover { color: var(--rose); }
  .sub-nav { display: flex; background: var(--bg3); border-radius: 12px; padding: 3px; gap: 2px; border: 1px solid var(--border2); }
  .sub-tab { flex: 1; padding: 7px 4px; background: none; border: none; cursor: pointer; border-radius: 9px; font-size: 12px; color: var(--text3); font-family: var(--font-b); transition: all 0.2s; }
  .sub-tab.active { background: var(--card); color: var(--rose); box-shadow: 0 1px 4px rgba(180,100,80,0.1); }
  .pill { background: rgba(199,92,114,0.08); border: 1px solid var(--border); border-radius: 20px; padding: 4px 12px; font-size: 12px; cursor: pointer; font-family: var(--font-b); color: var(--text2); transition: all 0.18s; display: inline-block; }
  .pill.active { background: var(--rose); color: #fff; border-color: var(--rose); }
  .pill-wrap { display: flex; gap: 6px; flex-wrap: wrap; }
  #toast { position: fixed; top: 74px; left: 50%; transform: translateX(-50%) translateY(-8px); background: var(--blush); color: #fff; padding: 9px 20px; border-radius: 40px; font-size: 13px; z-index: 999; opacity: 0; transition: all 0.3s; pointer-events: none; white-space: nowrap; font-family: var(--font-d); font-style: italic; }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .modal-bg { position: fixed; inset: 0; background: rgba(40,10,15,0.45); z-index: 500; display: flex; align-items: flex-end; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.25s; }
  .modal-bg.open { opacity: 1; pointer-events: all; }
  .modal { background: var(--card); border-radius: 22px 22px 0 0; border-top: 1px solid var(--border); padding: 20px 16px 36px; width: 100%; max-width: 480px; max-height: 90vh; overflow-y: auto; transform: translateY(30px); transition: transform 0.25s; }
  .modal-bg.open .modal { transform: translateY(0); }
  .modal-handle { width: 36px; height: 3px; background: var(--border); border-radius: 2px; margin: 0 auto 18px; }
  .modal-title { font-family: var(--font-d); font-size: 20px; font-style: italic; color: var(--blush); margin-bottom: 18px; }
  .form-row { margin-bottom: 13px; }
  .form-label { display: block; font-size: 10px; color: var(--text3); letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 5px; font-weight: 500; }
  .empty { text-align: center; padding: 36px 16px; }
  .empty .empty-icon { font-size: 34px; margin-bottom: 10px; opacity: 0.4; }
  .empty p { font-size: 13px; font-style: italic; font-family: var(--font-d); color: var(--text3); line-height: 1.6; }
  .divider { height: 1px; background: var(--border2); margin: 10px 0; }
  /* KEY FIX: no transform on detail-view = modals work inside them */
  .detail-view { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: var(--bg); z-index: 150; overflow: hidden; flex-direction: column; }
  .detail-view.open { display: flex; }
  .detail-header { background: var(--card); border-bottom: 1px solid var(--border); padding: 12px 16px; display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
  .detail-back { background: none; border: none; cursor: pointer; color: var(--rose); font-size: 20px; padding: 2px 4px; }
  .detail-title { font-family: var(--font-d); font-size: 17px; font-style: italic; color: var(--text); flex: 1; }
  .detail-body { padding: 14px 14px 32px; overflow-y: auto; flex: 1; }
  .check-row { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--border2); }
  .check-box { width: 20px; min-width: 20px; height: 20px; border-radius: 5px; border: 1.5px solid var(--text3); background: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 11px; color: transparent; transition: all 0.15s; }
  .check-box.done { background: var(--rose); border-color: var(--rose); color: #fff; }
  .star-rating { display: flex; gap: 4px; }
  .star-rating button { background: none; border: none; cursor: pointer; font-size: 20px; color: var(--text3); padding: 0; }
  .star-rating button.lit { color: var(--rose); }
  .stars { color: var(--rose); font-size: 12px; letter-spacing: 2px; }
  .prog-bar { height: 3px; background: var(--bg3); border-radius: 99px; overflow: hidden; }
  .prog-fill { height: 100%; background: linear-gradient(90deg, var(--berry), var(--rose)); border-radius: 99px; transition: width 0.4s; }
  .status-badge { display: inline-block; font-size: 10px; padding: 2px 9px; border-radius: 20px; letter-spacing: 0.05em; text-transform: uppercase; font-weight: 500; }
  .status-reading  { background: rgba(199,92,114,0.12); color: var(--rose); }
  .status-owned    { background: rgba(160,100,60,0.12); color: #a06040; }
  .status-wishlist { background: rgba(100,80,160,0.10); color: #8070b0; }
  .status-done     { background: rgba(80,140,80,0.10); color: #507850; }
  .recipe-card { background: var(--card); border-radius: 16px; border: 1px solid var(--border2); overflow: hidden; cursor: pointer; transition: border-color 0.2s, transform 0.15s; box-shadow: 0 2px 8px rgba(180,100,80,0.07); }
  .recipe-card:hover { border-color: var(--rose-dim); transform: translateY(-1px); }
  .recipe-img { width: 100%; height: 128px; background: linear-gradient(135deg, #f5ddd5, #ecddd8); display: flex; align-items: center; justify-content: center; font-size: 40px; overflow: hidden; }
  .recipe-img img { width: 100%; height: 100%; object-fit: cover; }
  .recipe-body { padding: 10px 12px 12px; }
  .recipe-title { font-family: var(--font-d); font-size: 14px; font-style: italic; color: var(--text); margin-bottom: 4px; line-height: 1.3; }
  .recipe-meta { font-size: 11px; color: var(--text2); display: flex; gap: 8px; align-items: center; }
  .recipe-tags { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 6px; }
  .recipe-tag { background: rgba(139,42,66,0.08); border: 1px solid rgba(139,42,66,0.14); border-radius: 20px; padding: 2px 8px; font-size: 10px; color: var(--dusty); }
  .book-card { background: var(--card); border-radius: 14px; border: 1px solid var(--border2); padding: 12px 13px; display: flex; gap: 12px; align-items: flex-start; cursor: pointer; box-shadow: 0 2px 8px rgba(180,100,80,0.06); }
  .book-card:hover { border-color: var(--rose-dim); }
  .book-spine { width: 44px; min-width: 44px; height: 62px; border-radius: 6px; background: linear-gradient(160deg, #c87090, #e0a0b0); display: flex; align-items: center; justify-content: center; font-size: 22px; box-shadow: 2px 3px 10px rgba(0,0,0,0.12); }
  .book-info { flex: 1; }
  .book-title { font-family: var(--font-d); font-size: 14px; font-style: italic; color: var(--text); }
  .book-author { font-size: 12px; color: var(--text2); margin-top: 2px; font-weight: 300; }
  .book-progress { margin-top: 8px; }
  .trip-card { background: var(--card); border-radius: 16px; border: 1px solid var(--border2); overflow: hidden; cursor: pointer; box-shadow: 0 2px 8px rgba(180,100,80,0.07); }
  .trip-card:hover { border-color: var(--rose-dim); }
  .trip-banner { height: 72px; background: linear-gradient(135deg, #f5e0d8, #edddd8); display: flex; align-items: center; padding: 0 14px; gap: 12px; border-bottom: 1px solid var(--border2); }
  .trip-emoji { font-size: 28px; }
  .trip-name { font-family: var(--font-d); font-size: 17px; font-style: italic; color: var(--blush); }
  .trip-dates { font-size: 11px; color: var(--text2); margin-top: 2px; font-weight: 300; }
  .trip-body { padding: 10px 13px; }
  .trip-status { font-size: 11px; font-weight: 500; }
  .status-planned   { color: var(--text2); }
  .status-upcoming  { color: var(--rose); }
  .status-completed { color: #507850; }
  .row { display: flex; gap: 8px; align-items: center; }
  .flex-between { display: flex; justify-content: space-between; align-items: center; }
  .mt4 { margin-top: 4px; } .mt8 { margin-top: 8px; } .mt12 { margin-top: 12px; }
  .note-text { font-size: 13px; color: var(--text2); font-style: italic; line-height: 1.6; font-family: var(--font-d); }
  .section-label { font-size: 10px; color: var(--text3); letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 6px; font-weight: 500; }
  a.link { color: var(--rose); font-size: 13px; word-break: break-all; text-decoration: none; border-bottom: 1px solid var(--rose-dim); }
</style>
</head>
<body>
<div id="app">
  <div id="toast"></div>
  <header><h1>Nessie's World</h1><p>places &middot; journeys &middot; stories</p></header>
  <main id="main-content">
    <div id="tab-recipes"  class="tab-panel"></div>
    <div id="tab-reading"  class="tab-panel" style="display:none"></div>
    <div id="tab-travel"   class="tab-panel" style="display:none"></div>
    <div id="tab-settings" class="tab-panel" style="display:none"></div>
  </main>
  <nav>
    <button class="active" data-tab="recipes"  onclick="switchTab('recipes')"><span class="icon">🍽️</span><span class="lbl">Recipes</span></button>
    <button data-tab="reading"  onclick="switchTab('reading')"><span class="icon">📚</span><span class="lbl">Reading</span></button>
    <button data-tab="travel"   onclick="switchTab('travel')"><span class="icon">✈️</span><span class="lbl">Travel</span></button>
    <button data-tab="settings" onclick="switchTab('settings')"><span class="icon">⚙️</span><span class="lbl">Settings</span></button>
  </nav>
</div>
<div id="detail-recipe" class="detail-view">
  <div class="detail-header">
    <button class="detail-back" onclick="closeDetail('recipe')">←</button>
    <span class="detail-title" id="detail-recipe-title"></span>
    <button class="icon-btn" id="detail-recipe-fav" onclick="toggleFavFromDetail()" style="font-size:18px">♡</button>
    <button class="icon-btn" onclick="editCurrentRecipe()">✏️</button>
    <button class="icon-btn" onclick="deleteCurrentRecipe()" style="color:var(--red)">🗑️</button>
  </div>
  <div class="detail-body" id="detail-recipe-body"></div>
</div>
<div id="detail-trip" class="detail-view">
  <div class="detail-header">
    <button class="detail-back" onclick="closeDetail('trip')">←</button>
    <span class="detail-title" id="detail-trip-title"></span>
    <button class="icon-btn" onclick="editCurrentTrip()">✏️</button>
    <button class="icon-btn" onclick="deleteCurrentTrip()" style="color:var(--red)">🗑️</button>
  </div>
  <div class="detail-body" id="detail-trip-body"></div>
</div>
<div id="modal-bg" class="modal-bg" onclick="closeModal(event)">
  <div class="modal"><div class="modal-handle"></div><div id="modal-content"></div></div>
</div>
<script>

const DB = {
  async get(k, fb) { try { const r = await window.storage.get(k); return r ? JSON.parse(r.value) : fb; } catch { return fb; } },
  async set(k, v)  { try { await window.storage.set(k, JSON.stringify(v)); } catch {} }
};
const state = {};
let currentTab = 'recipes';
let currentRecipeId = null, currentTripId = null;

async function init() {
  state.recipes = await DB.get('recipes', []);
  state.books   = await DB.get('books', []);
  state.trips   = await DB.get('trips', []);
  state.yearlyReadingGoal = await DB.get('yearlyReadingGoal', 12);
  renderAll();
}
function renderAll() { renderRecipes(); renderReading(); renderTravel(); }

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2200);
}
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-panel').forEach(p => p.style.display = 'none');
  document.getElementById('tab-' + tab).style.display = 'block';
  document.querySelectorAll('nav button').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
}
function openModal(html) {
  document.getElementById('modal-content').innerHTML = html;
  document.getElementById('modal-bg').classList.add('open');
}
function closeModal(e) {
  if (!e || e.target === document.getElementById('modal-bg'))
    document.getElementById('modal-bg').classList.remove('open');
}
let _pendingDelete = null;
function confirmDelete(msg, fn) {
  _pendingDelete = fn;
  openModal(`<div style="text-align:center;padding:8px 0 4px">
    <div style="font-size:28px;margin-bottom:12px">\u{1F5D1}\uFE0F</div>
    <div style="font-family:var(--font-d);font-size:17px;font-style:italic;color:var(--blush);margin-bottom:8px">Are you sure?</div>
    <div style="font-size:13px;color:var(--text2);margin-bottom:24px">${msg}</div>
    <div style="display:flex;gap:10px">
      <button class="btn-outline btn-full" onclick="closeModal()">Cancel</button>
      <button class="btn btn-full" style="background:var(--red)" onclick="executePendingDelete()">Delete</button>
    </div></div>`);
}
function executePendingDelete() { if (_pendingDelete) { _pendingDelete(); _pendingDelete = null; } closeModal(); }
function closeDetail(type) { document.getElementById('detail-' + type).classList.remove('open'); }
function setStars(n, id) {
  const el = document.getElementById(id); el.dataset.rating = n;
  el.querySelectorAll('button').forEach((b, i) => { b.classList.toggle('lit', i < n); b.textContent = i < n ? '★' : '☆'; });
}
function selectEmoji(e, btn) {
  btn.closest('.pill-wrap').querySelectorAll('.pill').forEach(b => b.classList.remove('active'));
  btn.classList.add('active'); btn.closest('.pill-wrap').dataset.selected = e;
}

// ══════════════════════════════════════════════════════════════════════════════
// RECIPES
// ══════════════════════════════════════════════════════════════════════════════
const RECIPE_CATS = ['Breakfast','Lunch','Dinner','Dessert','Snacks','Drinks','Baking','Other'];

function toggleFavourite(id, e) {
  e.stopPropagation();
  state.recipes = state.recipes.map(r => r.id===id ? {...r, favourite: !r.favourite} : r);
  DB.set('recipes', state.recipes);
  renderRecipes();
}

function renderRecipes() {
  const el = document.getElementById('tab-recipes');
  const catFilter = el.dataset.cat || 'all';
  const tagFilter = el.dataset.tag || '';
  const view      = el.dataset.view || 'all'; // 'all' | 'favourites'

  // build list
  let list = state.recipes;
  if (view === 'favourites') list = list.filter(r => r.favourite);
  if (catFilter !== 'all')   list = list.filter(r => r.category === catFilter);
  if (tagFilter)             list = list.filter(r => r.tags?.includes(tagFilter));

  // collect all tags from cat-filtered (not tag-filtered) set for the tag row
  let tagPool = state.recipes;
  if (view === 'favourites') tagPool = tagPool.filter(r => r.favourite);
  if (catFilter !== 'all')   tagPool = tagPool.filter(r => r.category === catFilter);
  const allTags = [...new Set(tagPool.flatMap(r => r.tags||[]))].sort();

  const favCount = state.recipes.filter(r=>r.favourite).length;

  let html = `<div class="col">
    <div class="flex-between">
      <div style="font-family:var(--font-d);font-size:20px;font-style:italic;color:var(--blush)">
        Recipe Journal <span style="font-size:13px;color:var(--text3)">(${state.recipes.length})</span>
      </div>
      <button class="btn btn-sm" onclick="openAddRecipe()">+ Add</button>
    </div>

    <!-- view toggle: All / Favourites -->
    <div class="sub-nav">
      <button class="sub-tab ${view==='all'?'active':''}" onclick="setRecipeView('all')">All recipes</button>
      <button class="sub-tab ${view==='favourites'?'active':''}" onclick="setRecipeView('favourites')">♡ Favourites ${favCount?`<span style="font-size:10px;opacity:.7">(${favCount})</span>`:''}</button>
    </div>

    <!-- category filter -->
    <div style="overflow-x:auto;padding-bottom:2px">
      <div style="display:flex;gap:6px;width:max-content">
        <button class="pill ${catFilter==='all'?'active':''}" onclick="setRecipeCat('all')">All</button>
        ${RECIPE_CATS.map(c=>`<button class="pill ${catFilter===c?'active':''}" onclick="setRecipeCat('${c}')">${c}</button>`).join('')}
      </div>
    </div>

    <!-- tag filter (only shown when tags exist) -->
    ${allTags.length ? `
    <div style="overflow-x:auto;padding-bottom:2px">
      <div style="display:flex;gap:5px;width:max-content;align-items:center">
        <span style="font-size:10px;color:var(--text3);letter-spacing:.08em;text-transform:uppercase;white-space:nowrap;padding-right:2px">Tag</span>
        <button class="pill ${!tagFilter?'active':''}" style="font-size:11px;padding:3px 9px" onclick="setRecipeTag('')">Any</button>
        ${allTags.map(t=>`<button class="pill ${tagFilter===t?'active':''}" style="font-size:11px;padding:3px 9px" onclick="setRecipeTag('${t.replace(/'/g,"\\'")}'">${t}</button>`).join('')}
      </div>
    </div>` : ''}`;

  if (list.length === 0) {
    const msg = view==='favourites' ? 'No favourites yet.<br>Tap ♡ on a recipe to save it here.' : 'No recipes here yet.';
    html += `<div class="empty"><div class="empty-icon">${view==='favourites'?'♡':'🍳'}</div><p>${msg}</p></div>`;
  } else {
    html += `<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">`;
    list.forEach(r => {
      html += `<div class="recipe-card" onclick="openRecipe('${r.id}')">
        <div class="recipe-img" style="position:relative">
          ${r.image ? `<img src="${r.image}" alt="">` : '🍽️'}
          <button onclick="toggleFavourite('${r.id}',event)" style="position:absolute;top:6px;right:7px;background:rgba(0,0,0,0.45);border:none;border-radius:50%;width:26px;height:26px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;line-height:1;color:${r.favourite?'var(--rose)':'rgba(255,255,255,0.6)'}">${r.favourite?'♥':'♡'}</button>
        </div>
        <div class="recipe-body">
          <div class="recipe-title">${r.title}</div>
          <div class="recipe-meta">
            ${r.time ? `⏱ ${r.time}` : ''}
            ${r.rating ? `<span class="stars">${'★'.repeat(r.rating)}</span>` : ''}
          </div>
          ${r.tags?.length ? `<div class="recipe-tags">${r.tags.slice(0,2).map(t=>`<span class="recipe-tag">${t}</span>`).join('')}</div>` : ''}
        </div>
      </div>`;
    });
    html += `</div>`;
  }
  html += `</div>`;
  el.innerHTML = html;
}

function setRecipeView(v) {
  const el = document.getElementById('tab-recipes');
  el.dataset.view = v;
  el.dataset.cat  = 'all';
  el.dataset.tag  = '';
  renderRecipes();
}
function setRecipeCat(c) {
  const el = document.getElementById('tab-recipes');
  el.dataset.cat = c;
  el.dataset.tag = ''; // reset tag when cat changes
  renderRecipes();
}
function setRecipeTag(t) {
  document.getElementById('tab-recipes').dataset.tag = t;
  renderRecipes();
}
// keep old name working just in case
function setRecipeFilter(f) { setRecipeCat(f); }

function openAddRecipe() {
  openModal(`
    <div class="modal-title">New Recipe</div>
    <div class="sub-nav" style="margin-bottom:14px">
      <button class="sub-tab active" onclick="switchRecipeMode('manual',this)">Type it in</button>
      <button class="sub-tab" onclick="switchRecipeMode('bookmark',this)">Bookmark</button>
    </div>
    <div id="recipe-mode-manual">
      ${recipeManualForm()}
    </div>
    <div id="recipe-mode-bookmark" style="display:none">
      ${recipeBookmarkForm()}
    </div>
  `);
}

function switchRecipeMode(mode, btn) {
  document.querySelectorAll('#modal-content .sub-tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('recipe-mode-manual').style.display = mode==='manual'?'block':'none';
  document.getElementById('recipe-mode-bookmark').style.display = mode==='bookmark'?'block':'none';
}

function recipeManualForm(r={}) {
  return `
    <div class="form-row"><label class="form-label">Title *</label>
      <input id="r-title" value="${r.title||''}" placeholder="Recipe name..."/></div>
    <div class="form-row"><label class="form-label">Category</label>
      <select id="r-cat">${RECIPE_CATS.map(c=>`<option ${r.category===c?'selected':''}>${c}</option>`).join('')}</select></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px">
      <div><label class="form-label">Prep time</label><input id="r-time" value="${r.time||''}" placeholder="e.g. 30 mins"/></div>
      <div><label class="form-label">Servings</label><input id="r-serves" value="${r.serves||''}" placeholder="e.g. 4"/></div>
    </div>
    <div class="form-row"><label class="form-label">Ingredients (one per line)</label>
      <textarea id="r-ingredients" rows="4" placeholder="200g flour&#10;2 eggs&#10;...">${(r.ingredients||[]).join('\n')}</textarea></div>
    <div class="form-row"><label class="form-label">Method</label>
      <textarea id="r-method" rows="5" placeholder="Step by step instructions...">${r.method||''}</textarea></div>
    <div class="form-row"><label class="form-label">Tags (comma separated)</label>
      <input id="r-tags" value="${(r.tags||[]).join(', ')}" placeholder="e.g. vegan, quick, comfort food"/></div>
    <div class="form-row"><label class="form-label">Notes</label>
      <textarea id="r-notes" rows="2" placeholder="Tips, variations...">${r.notes||''}</textarea></div>
    <div class="form-row"><label class="form-label">Rating</label>
      <div class="star-rating" id="r-stars">
        ${[1,2,3,4,5].map(i=>`<button type="button" onclick="setStars(${i},'r-stars')" class="${(r.rating||0)>=i?'lit':''}">${(r.rating||0)>=i?'★':'☆'}</button>`).join('')}
      </div></div>
    <button class="btn btn-full" style="margin-top:8px" onclick="saveManualRecipe(${r.id?`'${r.id}'`:'null'})">Save Recipe</button>
  `;
}

function recipeBookmarkForm(r={}) {
  return `
    <div class="form-row"><label class="form-label">Title *</label>
      <input id="rb-title" value="${r.title||''}" placeholder="Recipe name..."/></div>
    <div class="form-row"><label class="form-label">Category</label>
      <select id="rb-cat">${RECIPE_CATS.map(c=>`<option ${r.category===c?'selected':''}>${c}</option>`).join('')}</select></div>
    <div class="form-row"><label class="form-label">URL / Link</label>
      <input id="rb-url" type="url" value="${r.url||''}" placeholder="https://..."/></div>
    <div class="form-row"><label class="form-label">Notes</label>
      <textarea id="rb-notes" rows="3" placeholder="What makes this special...">${r.notes||''}</textarea></div>
    <div class="form-row"><label class="form-label">Tags (comma separated)</label>
      <input id="rb-tags" value="${(r.tags||[]).join(', ')}" placeholder="e.g. weekend, summer..."/></div>
    <div class="form-row"><label class="form-label">Rating</label>
      <div class="star-rating" id="rb-stars">
        ${[1,2,3,4,5].map(i=>`<button type="button" onclick="setStars(${i},'rb-stars')" class="${(r.rating||0)>=i?'lit':''}">${(r.rating||0)>=i?'★':'☆'}</button>`).join('')}
      </div></div>
    <button class="btn btn-full" style="margin-top:8px" onclick="saveBookmarkRecipe(${r.id?`'${r.id}'`:'null'})">Save Bookmark</button>

function setStars(n, containerId) {
  const el = document.getElementById(containerId);
  el.dataset.rating = n;
  el.querySelectorAll('button').forEach((b,i) => {
    b.classList.toggle('lit', i < n);
    b.textContent = i < n ? '★' : '☆';
  });
}

function saveManualRecipe(editId) {
  const title = document.getElementById('r-title').value.trim();
  if (!title) { toast('Please add a title ✦'); return; }
  const recipe = {
    id: editId || Date.now()+'', title,
    category: document.getElementById('r-cat').value,
    time: document.getElementById('r-time').value.trim(),
    serves: document.getElementById('r-serves').value.trim(),
    ingredients: document.getElementById('r-ingredients').value.split('\n').map(s=>s.trim()).filter(Boolean),
    method: document.getElementById('r-method').value.trim(),
    tags: document.getElementById('r-tags').value.split(',').map(s=>s.trim()).filter(Boolean),
    notes: document.getElementById('r-notes').value.trim(),
    rating: parseInt(document.getElementById('r-stars').dataset.rating)||0,
    type: 'manual', created: editId ? undefined : Date.now(),
  };
  if (editId) { state.recipes = state.recipes.map(r=>r.id===editId?{...r,...recipe,created:r.created}:r); }
  else state.recipes.unshift(recipe);
  DB.set('recipes', state.recipes);
  closeModal(); renderRecipes();
  toast(editId ? 'Recipe updated ✦' : 'Recipe saved ✦');
}

function saveBookmarkRecipe(editId) {
  const title = document.getElementById('rb-title').value.trim();
  if (!title) { toast('Please add a title ✦'); return; }
  const recipe = {
    id: editId || Date.now()+'', title,
    category: document.getElementById('rb-cat').value,
    url: document.getElementById('rb-url').value.trim(),
    notes: document.getElementById('rb-notes').value.trim(),
    tags: document.getElementById('rb-tags').value.split(',').map(s=>s.trim()).filter(Boolean),
    rating: parseInt(document.getElementById('rb-stars').dataset.rating)||0,
    type: 'bookmark', created: editId ? undefined : Date.now(),
  };
  if (editId) { state.recipes = state.recipes.map(r=>r.id===editId?{...r,...recipe,created:r.created}:r); }
  else state.recipes.unshift(recipe);
  DB.set('recipes', state.recipes);
  closeModal(); renderRecipes();
  toast(editId ? 'Bookmark updated ✦' : 'Bookmark saved ✦');
}

function openRecipe(id) {
  const r = state.recipes.find(x=>x.id===id);
  if (!r) return;
  currentRecipeId = id;
  document.getElementById('detail-recipe-title').textContent = r.title;
  // update fav button in header
  const favBtn = document.getElementById('detail-recipe-fav');
  if (favBtn) { favBtn.textContent = r.favourite ? '♥' : '♡'; favBtn.style.color = r.favourite ? 'var(--rose)' : 'var(--text3)'; }
  let body = '';
  if (r.image) body += `<img src="${r.image}" style="width:100%;border-radius:10px;margin-bottom:14px;max-height:200px;object-fit:cover">`;
  body += `<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px">`;
  if (r.category) body += `<span class="recipe-tag">${r.category}</span>`;
  if (r.time) body += `<span class="recipe-tag">⏱ ${r.time}</span>`;
  if (r.serves) body += `<span class="recipe-tag">🍽 ${r.serves} servings</span>`;
  body += `</div>`;
  if (r.rating) body += `<div class="stars mb">${'★'.repeat(r.rating)}${'☆'.repeat(5-r.rating)}</div><div class="divider"></div>`;
  if (r.url) body += `<div class="form-row"><div class="section-label">Source</div><a class="link" href="${r.url}" target="_blank">${r.url}</a></div>`;
  if (r.ingredients?.length) {
    body += `<div class="mt12"><div class="section-label">Ingredients</div>`;
    body += r.ingredients.map(i=>`<div class="check-row"><button class="check-box" onclick="this.classList.toggle('done');this.textContent=this.classList.contains('done')?'✓':''"></button><span style="font-size:14px">${i}</span></div>`).join('');
    body += `</div>`;
  }
  if (r.method) body += `<div class="mt12"><div class="section-label">Method</div><div class="note-text" style="white-space:pre-wrap">${r.method}</div></div>`;
  if (r.notes) body += `<div class="mt12"><div class="section-label">Notes</div><div class="note-text">${r.notes}</div></div>`;
  if (r.tags?.length) body += `<div class="mt12 pill-wrap">${r.tags.map(t=>`<span class="recipe-tag">${t}</span>`).join('')}</div>`;
  document.getElementById('detail-recipe-body').innerHTML = body;
  document.getElementById('detail-recipe').classList.add('open');
}

function editCurrentRecipe() {
  const r = state.recipes.find(x=>x.id===currentRecipeId);
  if (!r) return;
  closeDetail('recipe');
  if (r.type === 'bookmark') {
    openModal(`<div class="modal-title">Edit Bookmark</div>${recipeBookmarkForm(r)}`);
  } else {
    openModal(`<div class="modal-title">Edit Recipe</div>${recipeManualForm(r)}`);
  }
}

function deleteCurrentRecipe() {
  confirmDelete('This recipe will be permanently removed.', () => {
    state.recipes = state.recipes.filter(r=>r.id!==currentRecipeId);
    DB.set('recipes', state.recipes);
    closeDetail('recipe'); renderRecipes(); toast('Deleted ✦');
  });
}

function toggleFavFromDetail() {
  state.recipes = state.recipes.map(r => r.id===currentRecipeId ? {...r, favourite: !r.favourite} : r);
  DB.set('recipes', state.recipes);
  const r = state.recipes.find(x=>x.id===currentRecipeId);
  const btn = document.getElementById('detail-recipe-fav');
  if (btn) { btn.textContent = r.favourite ? '♥' : '♡'; btn.style.color = r.favourite ? 'var(--rose)' : 'var(--text3)'; }
  renderRecipes();
  toast(r.favourite ? 'Added to favourites ♥' : 'Removed from favourites');
}

// ══════════════════════════════════════════════════════════════════════════════
// READING HUB
// ══════════════════════════════════════════════════════════════════════════════
const BOOK_STATUSES = ['reading','owned','wishlist','done'];
const STATUS_LABELS = {reading:'Reading',owned:'On my shelf',wishlist:'Want to buy',done:'Finished'};
const STATUS_ICONS  = {reading:'📖',owned:'🏠',wishlist:'🛒',done:'✅'};
const GENRES = ['Fiction','Non-fiction','Fantasy','Romance','Mystery','Sci-Fi','Biography','Self-help','Poetry','Other'];

function toggleBookFav(id, e) {
  if (e) e.stopPropagation();
  state.books = state.books.map(b => b.id===id ? {...b, favourite:!b.favourite} : b);
  DB.set('books', state.books); renderReading();
}

function updatePageProgress(id, page) {
  state.books = state.books.map(b => b.id===id ? {...b, currentPage: parseInt(page)||0} : b);
  DB.set('books', state.books);
}

function renderReading() {
  const el = document.getElementById('tab-reading');
  const filter     = el.dataset.filter     || 'all';
  const favOnly    = el.dataset.fav        === 'true';
  const browseMode = el.dataset.browse     || 'list';   // 'list' | 'authors' | 'collections'
  const authorFilter     = el.dataset.authorFilter     || '';
  const collectionFilter = el.dataset.collectionFilter || '';

  const thisYear     = new Date().getFullYear();
  const yearlyGoal   = state.yearlyReadingGoal || 12;
  const readThisYear = state.books.filter(b => b.status==='done' && b.finishedYear == thisYear).length;
  const goalPct      = Math.min(100, Math.round(readThisYear / yearlyGoal * 100));
  const counts = {
    reading: state.books.filter(b=>b.status==='reading').length,
    owned:   state.books.filter(b=>b.status==='owned').length,
    wishlist:state.books.filter(b=>b.status==='wishlist').length,
    done:    state.books.filter(b=>b.status==='done').length,
  };

  let html = `<div class="col">
    <div class="flex-between">
      <div style="font-family:var(--font-d);font-size:20px;font-style:italic;color:var(--blush)">Reading Hub</div>
      <button class="btn btn-sm" onclick="openAddBook()">+ Add</button>
    </div>

    <div class="card" style="padding:12px 14px">
      <div class="flex-between" style="margin-bottom:7px">
        <div style="font-size:12px;color:var(--text2)">📅 ${thisYear} reading goal</div>
        <div style="display:flex;align-items:center;gap:8px">
          <span style="font-size:13px;color:var(--rose);font-family:var(--font-d)">${readThisYear} / ${yearlyGoal}</span>
          <button onclick="editYearlyGoal()" style="background:none;border:none;cursor:pointer;font-size:11px;color:var(--text3);padding:0;font-family:var(--font-b)">edit</button>
        </div>
      </div>
      <div class="prog-bar" style="height:6px"><div class="prog-fill" style="width:${goalPct}%"></div></div>
      ${goalPct>=100
        ? `<div style="font-size:11px;color:var(--rose);margin-top:5px;font-style:italic;font-family:var(--font-d)">Goal reached! 🎉</div>`
        : `<div style="font-size:10px;color:var(--text3);margin-top:4px">${yearlyGoal - readThisYear} more to go this year</div>`}
    </div>

    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:6px">
      ${['reading','owned','wishlist','done'].map(s=>`
        <div class="card" style="text-align:center;padding:9px 4px;cursor:pointer;border-color:${filter===s&&browseMode==='list'&&!favOnly?'var(--rose-dim)':'var(--border2)'}" onclick="setBookFilter('${s}')">
          <div style="font-size:16px">${STATUS_ICONS[s]}</div>
          <div style="font-family:var(--font-d);font-size:16px;color:var(--rose);line-height:1.2">${counts[s]}</div>
          <div style="font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-top:1px;line-height:1.3">${STATUS_LABELS[s]}</div>
        </div>`).join('')}
    </div>

    <div class="sub-nav">
      <button class="sub-tab ${browseMode==='list'&&filter==='all'&&!favOnly?'active':''}" onclick="setBookFilter('all')">All</button>
      <button class="sub-tab ${browseMode==='list'&&filter==='reading'&&!favOnly?'active':''}" onclick="setBookFilter('reading')">Reading</button>
      <button class="sub-tab ${browseMode==='list'&&filter==='owned'&&!favOnly?'active':''}" onclick="setBookFilter('owned')">Shelf</button>
      <button class="sub-tab ${browseMode==='list'&&filter==='wishlist'&&!favOnly?'active':''}" onclick="setBookFilter('wishlist')">Wishlist</button>
      <button class="sub-tab ${browseMode==='list'&&filter==='done'&&!favOnly?'active':''}" onclick="setBookFilter('done')">Done</button>
      <button class="sub-tab ${favOnly?'active':''}" onclick="setBookFav()" style="min-width:36px">♥</button>
    </div>

    <div class="sub-nav">
      <button class="sub-tab ${browseMode==='list'?'active':''}" onclick="setBookBrowse('list')">📋 List</button>
      <button class="sub-tab ${browseMode==='authors'?'active':''}" onclick="setBookBrowse('authors')">✍️ Authors</button>
      <button class="sub-tab ${browseMode==='collections'?'active':''}" onclick="setBookBrowse('collections')">📚 Collections</button>
    </div>`;

  // ── AUTHOR BROWSE ───────────────────────────────────────────────────────────
  if (browseMode === 'authors') {
    if (authorFilter) {
      // Show books by this author
      const authorBooks = state.books.filter(b => b.author === authorFilter);
      const done = authorBooks.filter(b=>b.status==='done').length;
      html += `<div style="display:flex;align-items:center;gap:8px;margin:-2px 0 2px">
        <button onclick="setBookBrowse('authors')" style="background:none;border:none;cursor:pointer;color:var(--rose);font-size:18px;padding:0">←</button>
        <div>
          <div style="font-family:var(--font-d);font-size:16px;font-style:italic;color:var(--blush)">${authorFilter}</div>
          <div style="font-size:11px;color:var(--text3)">${authorBooks.length} book${authorBooks.length!==1?'s':''} · ${done} finished</div>
        </div>
      </div>`;
      if (!authorBooks.length) {
        html += `<div class="empty"><div class="empty-icon">✍️</div><p>No books by this author yet.</p></div>`;
      } else {
        authorBooks.forEach(b => { html += bookCardHtml(b); });
      }
    } else {
      // Author grid
      const authorMap = {};
      state.books.forEach(b => {
        if (!b.author) return;
        if (!authorMap[b.author]) authorMap[b.author] = [];
        authorMap[b.author].push(b);
      });
      const authors = Object.entries(authorMap).sort((a,b)=>a[0].localeCompare(b[0]));
      if (!authors.length) {
        html += `<div class="empty"><div class="empty-icon">✍️</div><p>Add author names to your books to browse by author.</p></div>`;
      } else {
        authors.forEach(([author, books]) => {
          const done = books.filter(b=>b.status==='done').length;
          const reading = books.filter(b=>b.status==='reading').length;
          html += `<div class="card" style="cursor:pointer;padding:12px 14px" onclick="setAuthorFilter('${author.replace(/'/g,"\\'")}')">
            <div class="flex-between">
              <div>
                <div style="font-family:var(--font-d);font-size:15px;font-style:italic;color:var(--text)">${author}</div>
                <div style="font-size:11px;color:var(--text3);margin-top:3px">
                  ${books.length} book${books.length!==1?'s':''}
                  ${reading ? ` · <span style="color:var(--rose)">reading ${reading}</span>` : ''}
                  ${done ? ` · ${done} finished` : ''}
                </div>
              </div>
              <div style="display:flex;gap:-4px">
                ${books.slice(0,4).map(b=>`<div style="width:28px;height:38px;border-radius:4px;background:linear-gradient(160deg,#c87090,#e0a0b0);display:inline-flex;align-items:center;justify-content:center;font-size:14px;margin-left:-4px;box-shadow:1px 1px 4px rgba(180,100,80,0.2)">${b.emoji||'📖'}</div>`).join('')}
                ${books.length>4?`<div style="width:28px;height:38px;border-radius:4px;background:var(--bg3);display:inline-flex;align-items:center;justify-content:center;font-size:10px;color:var(--text3);margin-left:-4px">+${books.length-4}</div>`:''}
              </div>
            </div>
          </div>`;
        });
      }
    }

  // ── COLLECTION BROWSE ───────────────────────────────────────────────────────
  } else if (browseMode === 'collections') {
    if (collectionFilter) {
      const collBooks = state.books.filter(b => b.collection === collectionFilter);
      const done = collBooks.filter(b=>b.status==='done').length;
      html += `<div style="display:flex;align-items:center;gap:8px;margin:-2px 0 2px">
        <button onclick="setBookBrowse('collections')" style="background:none;border:none;cursor:pointer;color:var(--rose);font-size:18px;padding:0">←</button>
        <div>
          <div style="font-family:var(--font-d);font-size:16px;font-style:italic;color:var(--blush)">${collectionFilter}</div>
          <div style="font-size:11px;color:var(--text3)">${collBooks.length} book${collBooks.length!==1?'s':''} · ${done} finished</div>
        </div>
      </div>`;
      // Progress bar for collection
      const pct = collBooks.length ? Math.round(done/collBooks.length*100) : 0;
      html += `<div class="card" style="padding:10px 13px">
        <div class="flex-between" style="margin-bottom:6px">
          <span style="font-size:12px;color:var(--text2)">Collection progress</span>
          <span style="font-size:13px;color:var(--rose);font-family:var(--font-d)">${done} / ${collBooks.length}</span>
        </div>
        <div class="prog-bar" style="height:5px"><div class="prog-fill" style="width:${pct}%"></div></div>
      </div>`;
      if (!collBooks.length) {
        html += `<div class="empty"><div class="empty-icon">📚</div><p>No books in this collection yet.</p></div>`;
      } else {
        // Sort by series number if present
        const sorted = [...collBooks].sort((a,b) => (a.seriesNum||999)-(b.seriesNum||999));
        sorted.forEach(b => { html += bookCardHtml(b); });
      }
    } else {
      // Collections grid
      const collMap = {};
      state.books.forEach(b => {
        if (!b.collection) return;
        if (!collMap[b.collection]) collMap[b.collection] = [];
        collMap[b.collection].push(b);
      });
      const colls = Object.entries(collMap).sort((a,b)=>a[0].localeCompare(b[0]));
      if (!colls.length) {
        html += `<div class="empty"><div class="empty-icon">📚</div><p>No collections yet.<br>Add a collection name when adding a book.</p></div>`;
      } else {
        colls.forEach(([name, books]) => {
          const done = books.filter(b=>b.status==='done').length;
          const reading = books.filter(b=>b.status==='reading').length;
          const pct = Math.round(done/books.length*100);
          html += `<div class="card" style="cursor:pointer;padding:12px 14px" onclick="setCollectionFilter('${name.replace(/'/g,"\\'")}')">
            <div style="font-family:var(--font-d);font-size:15px;font-style:italic;color:var(--text);margin-bottom:6px">${name}</div>
            <div style="font-size:11px;color:var(--text3);margin-bottom:8px">
              ${books.length} book${books.length!==1?'s':''}
              ${reading ? ` · <span style="color:var(--rose)">reading</span>` : ''}
              ${done===books.length&&books.length>0 ? ` · <span style="color:#507850">complete! ✓</span>` : ` · ${done} finished`}
            </div>
            <div class="prog-bar" style="height:4px"><div class="prog-fill" style="width:${pct}%"></div></div>
          </div>`;
        });
      }
    }

  // ── STANDARD LIST ───────────────────────────────────────────────────────────
  } else {
    let list = state.books;
    if (filter !== 'all') list = list.filter(b => b.status === filter);
    if (favOnly)          list = list.filter(b => b.favourite);
    if (!list.length) {
      const msgs = {reading:'Nothing in progress yet.',owned:'Your shelf is empty — for now.',wishlist:'No wishlist yet.',done:'No finished books yet.',all:'No books yet. Add your first one.'};
      html += `<div class="empty"><div class="empty-icon">${favOnly?'♡':STATUS_ICONS[filter]||'📚'}</div><p>${favOnly?'No favourites yet.':msgs[filter]||msgs.all}</p></div>`;
    } else {
      list.forEach(b => { html += bookCardHtml(b); });
    }
  }

  html += `</div>`;
  el.innerHTML = html;
}

  return `<div class="book-card" onclick="openEditBook('${b.id}')">

      <button onclick="toggleBookFav('${b.id}',event)" style="position:absolute;top:-6px;right:-6px;background:var(--bg3);border:1px solid var(--border2);border-radius:50%;width:18px;height:18px;cursor:pointer;font-size:10px;display:flex;align-items:center;justify-content:center;color:${b.favourite?'var(--rose)':'var(--text3)'};padding:0;line-height:1">${b.favourite?'♥':'♡'}</button>
    </div>

      <div class="mt4" style="display:flex;align-items:center;gap:7px;flex-wrap:wrap">

function saveBook(editId) {
  const title = document.getElementById('b-title').value.trim();
  if (!title) { toast('Please add a title ✦'); return; }
  const emojiEl = document.querySelector('#modal-content .pill-wrap[data-selected]');
  const emoji = emojiEl?.dataset.selected || document.querySelector('#modal-content .pill-wrap .pill.active')?.textContent || '📖';
  const newStatus = document.getElementById('b-status').value;
  const oldBook = editId ? state.books.find(b=>b.id===editId) : null;
  const book = {
    id: editId || Date.now()+'', title,
    author: document.getElementById('b-author').value.trim(),
    genre: document.getElementById('b-genre').value,
    status: newStatus,
    collection: document.getElementById('b-collection').value.trim() || undefined,
    seriesNum: parseInt(document.getElementById('b-seriesnum').value)||undefined,
    pages: parseInt(document.getElementById('b-pages').value)||0,
    currentPage: parseInt(document.getElementById('b-curpage').value)||0,
    emoji, rating: parseInt(document.getElementById('b-stars').dataset.rating)||0,

    favourite: oldBook?.favourite || false,
    finishedYear: newStatus==='done' ? (oldBook?.finishedYear || new Date().getFullYear()) : undefined,
  };
  if (editId) state.books = state.books.map(b=>b.id===editId?{...b,...book}:b);

// TRAVEL PLANNER

const TRIP_STATUS_LABELS = {planned:'Planned',upcoming:'Upcoming',completed:'Completed'};

function tripAutoStatus(t) {
  // auto-derive status from dates unless manually overridden
  if (t.statusOverride) return t.statusOverride;
  const now = new Date(); now.setHours(0,0,0,0);
  const from = t.dateFrom ? new Date(t.dateFrom) : null;
  const to   = t.dateTo   ? new Date(t.dateTo)   : from;
  if (!from) return 'planned';
  if (to && to < now) return 'completed';
  const daysAway = Math.ceil((from - now) / 86400000);
  if (daysAway <= 30) return 'upcoming';
  return 'planned';
}

function renderTravel() {
  const el = document.getElementById('tab-travel');
  const filter = el.dataset.filter || 'all';
  // apply auto-status before rendering
  state.trips = state.trips.map(t => ({...t, status: tripAutoStatus(t)}));
  let list = state.trips;
  if (filter !== 'all') list = list.filter(t => t.status === filter);

  const counts = {
    upcoming:  state.trips.filter(t=>t.status==='upcoming').length,
    planned:   state.trips.filter(t=>t.status==='planned').length,
    completed: state.trips.filter(t=>t.status==='completed').length,
  };

  let html = `<div class="col">
    <div class="flex-between">
      <div style="font-family:var(--font-d);font-size:20px;font-style:italic;color:var(--blush)">Travel Planner</div>
      <button class="btn btn-sm" onclick="openAddTrip()">+ Add</button>
    </div>
    <div class="sub-nav">
      <button class="sub-tab ${filter==='all'?'active':''}" onclick="setTripFilter('all')">All <span style="opacity:.6;font-size:10px">${state.trips.length}</span></button>
      <button class="sub-tab ${filter==='upcoming'?'active':''}" onclick="setTripFilter('upcoming')">Upcoming ${counts.upcoming?`<span style="opacity:.6;font-size:10px">${counts.upcoming}</span>`:''}</button>
      <button class="sub-tab ${filter==='planned'?'active':''}" onclick="setTripFilter('planned')">Planned</button>
      <button class="sub-tab ${filter==='completed'?'active':''}" onclick="setTripFilter('completed')">Done</button>
    </div>`;

  if (list.length === 0) {
    html += `<div class="empty"><div class="empty-icon">✈️</div><p>No trips here yet.<br>The world is waiting.</p></div>`;
  } else {
    list.forEach(t => {
      const packDone  = (t.packing||[]).filter(p=>p.done).length;
      const packTotal = (t.packing||[]).length;
      const cities = (t.itinerary||[]).map(c=>c.city).filter(Boolean).join(' → ') || t.destination;
      html += `<div class="trip-card" onclick="openTrip('${t.id}')">
        <div class="trip-banner">
          <span class="trip-emoji">${t.emoji||'✈️'}</span>
          <div style="flex:1;min-width:0">
            <div class="trip-name">${t.destination}</div>
            ${cities !== t.destination ? `<div style="font-size:10px;color:var(--text3);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${cities}</div>` : ''}
            <div class="trip-dates">${t.dateFrom||''} ${t.dateTo?'→ '+t.dateTo:''}</div>
          </div>
        </div>
        <div class="trip-body">
          <div class="flex-between">
            <span class="trip-status status-${t.status}">${TRIP_STATUS_LABELS[t.status]}</span>
            <div style="display:flex;gap:8px;align-items:center">
              ${t.rating ? `<span class="stars" style="font-size:11px">${'★'.repeat(t.rating)}</span>` : ''}
              ${packTotal ? `<span style="font-size:11px;color:var(--text3)">🎒 ${packDone}/${packTotal}</span>` : ''}
            </div>
          </div>
        </div>
      </div>`;
    });
  }
  html += `</div>`;
  el.innerHTML = html;
}

  document.getElementById('tab-travel').dataset.filter = f;

function tripBasicForm(t={}) {
  const EMOJIS = ['✈️','🌍','🏖️','🏔️','🗺️','🚂','🛳️','🏕️','🌸','🌊'];
  return `
    <div class="form-row"><label class="form-label">Trip name / Destination *</label>
      <input id="t-dest" value="${t.destination||''}" placeholder="e.g. Japan trip, Paris weekend..."/></div>
    <div class="form-row"><label class="form-label">Icon</label>
      <div class="pill-wrap">${EMOJIS.map(e=>`<button class="pill ${(t.emoji||'✈️')===e?'active':''}" onclick="selectEmoji('${e}',this)">${e}</button>`).join('')}</div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px">
      <div><label class="form-label">Departure</label><input id="t-from" type="date" value="${t.dateFrom||''}"/></div>
      <div><label class="form-label">Return</label><input id="t-to" type="date" value="${t.dateTo||''}"/></div>
    </div>
    <div class="form-row"><label class="form-label">Status override <span style="font-weight:300;text-transform:none;letter-spacing:0">(leave blank for auto)</span></label>
      <select id="t-override">
        <option value="">Auto-detect from dates</option>
        <option value="planned"   ${t.statusOverride==='planned'  ?'selected':''}>Planned</option>
        <option value="upcoming"  ${t.statusOverride==='upcoming' ?'selected':''}>Upcoming</option>
        <option value="completed" ${t.statusOverride==='completed'?'selected':''}>Completed</option>
      </select></div>
    <div class="form-row"><label class="form-label">Packing list (one per line)</label>
      <textarea id="t-packing" rows="4" placeholder="Passport&#10;Sunscreen&#10;Camera...">${(t.packing||[]).map(p=>typeof p==='string'?p:p.text).join('\n')}</textarea></div>
    ${t.status==='completed'||t.statusOverride==='completed' ? `
    <div class="form-row"><label class="form-label">Rating</label>
      <div class="star-rating" id="t-stars">
        ${[1,2,3,4,5].map(i=>`<button type="button" onclick="setStars(${i},'t-stars')" class="${(t.rating||0)>=i?'lit':''}">${(t.rating||0)>=i?'★':'☆'}</button>`).join('')}
      </div></div>` : `
    <div class="form-row"><label class="form-label">Rating <span style="font-weight:300;text-transform:none;letter-spacing:0">(after trip)</span></label>
      <div class="star-rating" id="t-stars">
        ${[1,2,3,4,5].map(i=>`<button type="button" onclick="setStars(${i},'t-stars')" class="${(t.rating||0)>=i?'lit':''}">${(t.rating||0)>=i?'★':'☆'}</button>`).join('')}
      </div></div>`}
    <button class="btn btn-full" style="margin-top:8px" onclick="saveTrip(${t.id?`'${t.id}'`:'null'})">Save Trip</button>
  `;
}

function saveTrip(editId) {
  const dest = document.getElementById('t-dest').value.trim();
  if (!dest) { toast('Please add a destination ✦'); return; }
  const emojiEl = document.querySelector('#modal-content .pill-wrap .pill.active');
  const packLines = document.getElementById('t-packing').value.split('\n').map(s=>s.trim()).filter(Boolean);
  let existingPacking = [];
  if (editId) { const existing = state.trips.find(t=>t.id===editId); existingPacking = existing?.packing||[]; }
  const packing = packLines.map(text => {
    const ex = existingPacking.find(p=>(typeof p==='string'?p:p.text)===text);
    return { text, done: ex?.done||false };
  });
  const override = document.getElementById('t-override').value;
  const existing = editId ? state.trips.find(t=>t.id===editId) : null;
  const trip = {
    id: editId || Date.now()+'',
    destination: dest,
    emoji: emojiEl?.textContent||'✈️',
    dateFrom: document.getElementById('t-from').value,
    dateTo:   document.getElementById('t-to').value,
    statusOverride: override || null,
    packing,
    rating: parseInt(document.getElementById('t-stars').dataset.rating)||0,
    itinerary: existing?.itinerary || [],
  };
  trip.status = tripAutoStatus(trip);
  if (editId) state.trips = state.trips.map(t=>t.id===editId?{...t,...trip}:t);
  else state.trips.unshift(trip);
  DB.set('trips', state.trips);
  closeModal(); renderTravel(); toast(editId?'Trip updated ✦':'Trip saved ✦');
}

          <div style="font-family:var(--font-d);font-size:15px;font-style:italic;color:var(--blush)">

          </div>
          <div style="display:flex;gap:4px">
            <button class="icon-btn" onclick="editCity('${t.id}',${ci})" style="font-size:13px">✏️</button>
            <button class="icon-btn" onclick="deleteCity('${t.id}',${ci})" style="color:var(--red);font-size:13px">🗑️</button>
          </div>
        </div>
        ${city.dateFrom||city.dateTo ? `<div style="font-size:11px;color:var(--text2);margin-bottom:6px">📅 ${city.dateFrom||''}${city.dateTo?' → '+city.dateTo:''}</div>` : ''}

        ${city.accommodation ? `
          <div style="margin-bottom:8px">
            <div class="section-label" style="margin-bottom:3px">Accommodation</div>
            <div style="font-size:13px;color:var(--text)">${city.accommodation}</div>
            ${city.checkIn||city.checkOut ? `<div style="font-size:11px;color:var(--text3);margin-top:2px">
              ${city.checkIn?'Check-in: '+city.checkIn:''} ${city.checkIn&&city.checkOut?' · ':''} ${city.checkOut?'Check-out: '+city.checkOut:''}
            </div>` : ''}
          </div>` : ''}

        ${city.transport ? `
          <div style="margin-bottom:8px">
            <div class="section-label" style="margin-bottom:3px">Getting there</div>
            <div style="font-size:13px;color:var(--text)">${city.transport}</div>
          </div>` : ''}

        ${city.todo?.length ? `
          <div style="margin-bottom:8px">
            <div class="section-label" style="margin-bottom:4px">Things to do</div>
            ${city.todo.map((item,ti)=>`
              <div class="check-row">
                <button class="check-box ${item.done?'done':''}" onclick="toggleCityItem('${t.id}',${ci},'todo',${ti},this)">${item.done?'✓':''}</button>
                <span style="font-size:13px;text-decoration:${item.done?'line-through':'none'};color:${item.done?'var(--text3)':'var(--text)'}">${item.text}</span>
              </div>`).join('')}
          </div>` : ''}

        ${city.eat?.length ? `
          <div style="margin-bottom:8px">
            <div class="section-label" style="margin-bottom:4px">Places to eat 🍽️</div>
            ${city.eat.map((item,ei)=>`
              <div class="check-row">
                <button class="check-box ${item.done?'done':''}" onclick="toggleCityItem('${t.id}',${ci},'eat',${ei},this)">${item.done?'✓':''}</button>
                <span style="font-size:13px;text-decoration:${item.done?'line-through':'none'};color:${item.done?'var(--text3)':'var(--text)'}">${item.text}</span>
              </div>`).join('')}
          </div>` : ''}

        ${city.notes ? `
          <div>
            <div class="section-label" style="margin-bottom:3px">Notes</div>
            <div class="note-text" style="font-size:12px;white-space:pre-wrap">${city.notes}</div>
          </div>` : ''}
      </div>`;
    });
  }
  body += `<button class="btn-outline btn-full" onclick="addCity('${t.id}')">+ Add city / stop</button>`;

  // ── Packing ──
  if (t.packing?.length) {
    const packDone = t.packing.filter(p=>p.done).length;
    body += `<div class="mt12"><div class="section-label">Packing list <span style="color:var(--text3);font-style:italic;font-size:10px">${packDone}/${t.packing.length}</span></div>`;
    t.packing.forEach((p,i) => {
      const text = typeof p==='string'?p:p.text;
      const done = p.done||false;
      body += `<div class="check-row">
        <button class="check-box ${done?'done':''}" onclick="togglePacking('${t.id}',${i},this)">${done?'✓':''}</button>
        <span style="font-size:14px;text-decoration:${done?'line-through':'none'};color:${done?'var(--text3)':'var(--text)'}">${text}</span>
      </div>`;
    });
    body += `</div>`;
  }

  document.getElementById('detail-trip-body').innerHTML = body;
}

function addCity(tripId) {
  openModal(`<div class="modal-title">Add a stop</div>${cityForm()}<button class="btn btn-full" style="margin-top:10px" onclick="saveCityEntry('${tripId}',null)">Add stop</button>`);
}
function editCity(tripId, ci) {
  const t = state.trips.find(x=>x.id===tripId);
  openModal(`<div class="modal-title">Edit stop</div>${cityForm(t.itinerary[ci])}<button class="btn btn-full" style="margin-top:10px" onclick="saveCityEntry('${tripId}',${ci})">Save</button>`);
}
function deleteCity(tripId, ci) {
  confirmDelete('Remove this stop from the itinerary?', () => {
    const t = state.trips.find(x=>x.id===tripId);
    t.itinerary.splice(ci,1);
    DB.set('trips', state.trips);
    renderTripDetail(t);
  });
}

function cityForm(c={}) {
  const CITY_EMOJIS = ['📍','🏙️','🌆','🏖️','🏔️','🌸','🏛️','🌃','🗼','🌴'];
  return `
    <div class="form-row"><label class="form-label">City / Location *</label>
      <input id="c-city" value="${c.city||''}" placeholder="e.g. Tokyo, Rome, Bali..."/></div>
    <div class="form-row"><label class="form-label">Icon</label>
      <div class="pill-wrap" id="city-emoji-wrap">${CITY_EMOJIS.map(e=>`<button class="pill ${(c.emoji||'📍')===e?'active':''}" onclick="selectEmoji('${e}',this)">${e}</button>`).join('')}</div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px">
      <div><label class="form-label">Arrival date</label><input id="c-from" type="date" value="${c.dateFrom||''}"/></div>
      <div><label class="form-label">Departure date</label><input id="c-to" type="date" value="${c.dateTo||''}"/></div>
    </div>

    <div class="form-row"><label class="form-label">Accommodation</label>
      <input id="c-accom" value="${c.accommodation||''}" placeholder="Hotel, Airbnb name..."/></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px">
      <div><label class="form-label">Check-in time</label><input id="c-checkin" type="time" value="${c.checkIn||''}"/></div>
      <div><label class="form-label">Check-out time</label><input id="c-checkout" type="time" value="${c.checkOut||''}"/></div>
    </div>

    <div class="form-row"><label class="form-label">Transport / Getting there</label>
      <input id="c-transport" value="${c.transport||''}" placeholder="e.g. Flight BA402, Train at 09:15..."/></div>

    <div class="form-row"><label class="form-label">Things to do (one per line)</label>
      <textarea id="c-todo" rows="3" placeholder="Visit the museum&#10;Hike to the viewpoint&#10;...">${(c.todo||[]).map(i=>i.text||i).join('\n')}</textarea></div>

    <div class="form-row"><label class="form-label">Places to eat (one per line)</label>
      <textarea id="c-eat" rows="3" placeholder="Sushi Saito&#10;The local market&#10;...">${(c.eat||[]).map(i=>i.text||i).join('\n')}</textarea></div>

    <div class="form-row"><label class="form-label">Notes</label>
      <textarea id="c-notes" rows="2" placeholder="Anything else...">${c.notes||''}</textarea></div>
  `;
}

function saveCityEntry(tripId, ci) {
  const city = document.getElementById('c-city').value.trim();
  if (!city) { toast('Please add a city name ✦'); return; }
  const emojiBtn = document.querySelector('#modal-content #city-emoji-wrap .pill.active') ||
                   document.querySelector('#modal-content .pill-wrap .pill.active');
  const existing = ci !== null ? (state.trips.find(t=>t.id===tripId)?.itinerary[ci]||{}) : {};
  const todoLines = document.getElementById('c-todo').value.split('\n').map(s=>s.trim()).filter(Boolean);
  const eatLines  = document.getElementById('c-eat').value.split('\n').map(s=>s.trim()).filter(Boolean);
  const entry = {
    city, emoji: emojiBtn?.textContent||'📍',
    dateFrom: document.getElementById('c-from').value,
    dateTo:   document.getElementById('c-to').value,
    accommodation: document.getElementById('c-accom').value.trim(),
    checkIn:  document.getElementById('c-checkin').value,
    checkOut: document.getElementById('c-checkout').value,
    transport: document.getElementById('c-transport').value.trim(),
    todo: todoLines.map(text => { const ex=existing.todo?.find(i=>i.text===text); return {text, done:ex?.done||false}; }),
    eat:  eatLines.map(text =>  { const ex=existing.eat?.find(i=>i.text===text);  return {text, done:ex?.done||false}; }),
    notes: document.getElementById('c-notes').value.trim(),
  };
  const t = state.trips.find(x=>x.id===tripId);
  if (!t.itinerary) t.itinerary = [];
  if (ci !== null) t.itinerary[ci] = entry;
  else t.itinerary.push(entry);
  DB.set('trips', state.trips);
  closeModal();
  renderTripDetail(t);
  toast(ci !== null ? 'Stop updated ✦' : 'Stop added ✦');
}

function toggleCityItem(tripId, ci, field, idx, btn) {
  const t = state.trips.find(x=>x.id===tripId);
  if (!t) return;
  t.itinerary[ci][field][idx].done = !t.itinerary[ci][field][idx].done;
  const done = t.itinerary[ci][field][idx].done;
  btn.classList.toggle('done', done);
  btn.textContent = done ? '✓' : '';
  btn.nextElementSibling.style.textDecoration = done ? 'line-through' : 'none';
  btn.nextElementSibling.style.color = done ? 'var(--text3)' : 'var(--text)';
  DB.set('trips', state.trips);
}

function togglePacking(tripId, idx, btn) {
  const trip = state.trips.find(t=>t.id===tripId);
  if (!trip) return;
  trip.packing[idx].done = !trip.packing[idx].done;
  const done = trip.packing[idx].done;
  btn.classList.toggle('done', done);
  btn.textContent = done ? '✓' : '';
  btn.nextElementSibling.style.textDecoration = done ? 'line-through' : 'none';
  btn.nextElementSibling.style.color = done ? 'var(--text3)' : 'var(--text)';
  DB.set('trips', state.trips);
}

function editCurrentTrip() {
  const t = state.trips.find(x=>x.id===currentTripId);
  if (!t) return;
  closeDetail('trip');
  openModal(`<div class="modal-title">Edit Trip</div>${tripBasicForm(t)}`);
}

function deleteCurrentTrip() {
  confirmDelete('This trip will be permanently removed.', () => {
    state.trips = state.trips.filter(t=>t.id!==currentTripId);
    DB.set('trips', state.trips); closeDetail('trip'); renderTravel(); toast('Deleted ✦');
  });
}

// ══════════════════════════════════════════════════════════════════════════════
// SETTINGS
// ══════════════════════════════════════════════════════════════════════════════
const ALL_KEYS = ['recipes','books','trips','yearlyReadingGoal'];

function renderSettings() {
  const counts = {
    recipes: (state.recipes||[]).length,
    books:   (state.books||[]).length,
    trips:   (state.trips||[]).length,
  };
  const total = counts.recipes + counts.books + counts.trips;

  document.getElementById('tab-settings').innerHTML = `<div class="col">
    <div style="font-family:var(--font-d);font-size:20px;font-style:italic;color:var(--blush)">Settings</div>

    <div class="card">
      <div class="card-title">📦 Your data</div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px">
        ${[['🍽️','Recipes',counts.recipes],['📚','Books',counts.books],['✈️','Trips',counts.trips]].map(([icon,label,n])=>`
          <div style="text-align:center;background:var(--bg3);border-radius:12px;padding:10px 4px;border:1px solid var(--border2)">
            <div style="font-size:18px">${icon}</div>
            <div style="font-family:var(--font-d);font-size:18px;color:var(--rose);line-height:1.2">${n}</div>
            <div style="font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-top:2px">${label}</div>
          </div>`).join('')}
      </div>
      <div style="font-size:12px;color:var(--text3);text-align:center;font-style:italic;font-family:var(--font-d)">${total} item${total!==1?'s':''} stored in total</div>
    </div>

    <div class="card">
      <div class="card-title">⬆️ Export</div>
      <p style="font-size:13px;color:var(--text2);margin-bottom:14px;line-height:1.6">Download a backup of all your recipes, books, and trips as a JSON file. Keep it somewhere safe — you can re-import it any time.</p>
      <button class="btn btn-full" onclick="exportData()">Download backup</button>
    </div>

    <div class="card">
      <div class="card-title">⬇️ Import</div>
      <p style="font-size:13px;color:var(--text2);margin-bottom:14px;line-height:1.6">Restore from a backup file. This will <strong>merge</strong> imported data with your current data — existing items won't be overwritten.</p>
      <label style="display:block;cursor:pointer">
        <input type="file" accept=".json" id="import-file-input" style="display:none" onchange="importData(this)"/>
        <div class="btn-outline btn-full" style="text-align:center;padding:9px">Choose backup file</div>
      </label>
      <div id="import-status" style="margin-top:8px;font-size:12px;color:var(--text3);font-style:italic;text-align:center;min-height:18px"></div>
    </div>

    <div class="card" style="border-color:rgba(192,48,64,0.18)">
      <div class="card-title" style="color:var(--red)">⚠️ Danger zone</div>
      <p style="font-size:13px;color:var(--text2);margin-bottom:10px;line-height:1.6">Permanently delete all your data. This cannot be undone — export a backup first if you want to keep anything.</p>
      <div style="display:flex;flex-direction:column;gap:8px">
        <button class="btn-outline btn-full" style="color:var(--red);border-color:rgba(192,48,64,0.3)" onclick="confirmResetSection('recipes','Recipes')">Reset recipes only</button>
        <button class="btn-outline btn-full" style="color:var(--red);border-color:rgba(192,48,64,0.3)" onclick="confirmResetSection('books','Books')">Reset books only</button>
        <button class="btn-outline btn-full" style="color:var(--red);border-color:rgba(192,48,64,0.3)" onclick="confirmResetSection('trips','Trips')">Reset trips only</button>
        <button class="btn btn-full" style="background:var(--red);margin-top:4px" onclick="confirmResetAll()">Reset everything</button>
      </div>
    </div>

    <div style="text-align:center;padding:12px 0 4px">
      <div style="font-family:var(--font-d);font-size:13px;font-style:italic;color:var(--text3)">🍓 Nessie's World</div>
    </div>
  </div>`;
}

function exportData() {
  const backup = {
    _version: 1,
    _exported: new Date().toISOString(),
    recipes: state.recipes || [],
    books:   state.books   || [],
    trips:   state.trips   || [],
    yearlyReadingGoal: state.yearlyReadingGoal || 12,
  };
  const blob = new Blob([JSON.stringify(backup, null, 2)], {type: 'application/json'});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  const date = new Date().toISOString().slice(0,10);
  a.href = url; a.download = `nessies-world-backup-${date}.json`;
  a.click(); URL.revokeObjectURL(url);
  toast('Backup downloaded ✦');
}

async function importData(input) {
  const file = input.files[0];
  if (!file) return;
  const status = document.getElementById('import-status');
  try {
    const text = await file.text();
    const data = JSON.parse(text);
    let added = 0;

    if (Array.isArray(data.recipes)) {
      const existingIds = new Set((state.recipes||[]).map(r=>r.id));
      const newOnes = data.recipes.filter(r => !existingIds.has(r.id));
      state.recipes = [...(state.recipes||[]), ...newOnes];
      added += newOnes.length;
      await DB.set('recipes', state.recipes);
    }
    if (Array.isArray(data.books)) {
      const existingIds = new Set((state.books||[]).map(b=>b.id));
      const newOnes = data.books.filter(b => !existingIds.has(b.id));
      state.books = [...(state.books||[]), ...newOnes];
      added += newOnes.length;
      await DB.set('books', state.books);
    }
    if (Array.isArray(data.trips)) {
      const existingIds = new Set((state.trips||[]).map(t=>t.id));
      const newOnes = data.trips.filter(t => !existingIds.has(t.id));
      state.trips = [...(state.trips||[]), ...newOnes];
      added += newOnes.length;
      await DB.set('trips', state.trips);
    }
    if (data.yearlyReadingGoal && !state.yearlyReadingGoal) {
      state.yearlyReadingGoal = data.yearlyReadingGoal;
      await DB.set('yearlyReadingGoal', state.yearlyReadingGoal);
    }

    renderAll(); renderSettings();
    status.style.color = 'var(--rose)';
    status.textContent = `✦ Imported ${added} new item${added!==1?'s':''} successfully`;
    input.value = '';
    toast(`Imported ${added} items ✦`);
  } catch(err) {
    status.style.color = 'var(--red)';
    status.textContent = 'Could not read file — make sure it\'s a valid backup.';
  }
}

function confirmResetSection(key, label) {
  confirmDelete(`All your ${label.toLowerCase()} will be permanently deleted.`, async () => {
    state[key] = key === 'yearlyReadingGoal' ? 12 : [];
    await DB.set(key, state[key]);
    renderAll(); renderSettings(); toast(`${label} cleared ✦`);
  });
}

function confirmResetAll() {
  _pendingDelete = async () => {
    state.recipes = []; state.books = []; state.trips = []; state.yearlyReadingGoal = 12;
    for (const k of ALL_KEYS) await DB.set(k, k === 'yearlyReadingGoal' ? 12 : []);
    renderAll(); renderSettings(); toast('All data cleared ✦');
  };
  openModal(`<div style="text-align:center;padding:8px 0 4px">
    <div style="font-size:32px;margin-bottom:12px">⚠️</div>
    <div style="font-family:var(--font-d);font-size:17px;font-style:italic;color:var(--red);margin-bottom:8px">Delete everything?</div>
    <div style="font-size:13px;color:var(--text2);margin-bottom:6px;line-height:1.6">All recipes, books, and trips will be permanently deleted.</div>
    <div style="font-size:12px;color:var(--text3);margin-bottom:24px;font-style:italic;font-family:var(--font-d)">Export a backup first if you're not sure.</div>
    <div style="display:flex;gap:10px">
      <button class="btn-outline btn-full" onclick="closeModal()">Cancel</button>
      <button class="btn btn-full" style="background:var(--red)" onclick="executePendingDelete()">Yes, delete all</button>
    </div>
  </div>`);
}

// patch renderAll to include settings
const _origRenderAll = renderAll;
function renderAll() { renderRecipes(); renderReading(); renderTravel(); renderSettings(); }

init();
</script>
